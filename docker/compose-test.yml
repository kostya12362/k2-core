name: test-web-app

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "40m"
    max-file: "3"

services:
  test-db:
    image: postgres:16.9
    restart: unless-stopped
    logging: *default-logging
    shm_size: 8gb
    ports:
      - "${POSTGRES_PORT}:5432"
    command: [ "postgres", "-c", "config_file=/etc/postgresql/postgresql.conf" ]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres.conf:/etc/postgresql/postgresql.conf:ro
    networks:
      - default
    healthcheck:
      test: [ "CMD-SHELL", "PGPASSWORD=${POSTGRES_PASSWORD} pg_isready -U ${POSTGRES_USER} -q -p 5432 -d ${POSTGRES_DB} || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  default:
    driver: bridge

volumes:
  postgres-data: